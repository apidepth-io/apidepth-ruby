name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: "${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: true

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    strategy:
      matrix:
        ruby-version: ["3.1", "3.2", "3.3"]

    steps:
      - uses: actions/checkout@v6

      - name: Checkout collector (SSRF fixture)
        uses: actions/checkout@v6
        with:
          repository: apidepth-io/apidepth-collector
          token: ${{ secrets.GH_PAT }}
          path: apidepth-collector
          sparse-checkout: tests/fixtures
          sparse-checkout-cone-mode: false

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby-version }}
          bundler-cache: true

      - name: Tests
        run: bundle exec rspec

  pipeline:
    name: Pipeline smoke test
    runs-on: ubuntu-latest
    needs: test

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: apidepth_test
          POSTGRES_USER: apidepth
          POSTGRES_PASSWORD: apidepth
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U apidepth"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://apidepth:apidepth@localhost:5432/apidepth_test
      DASHBOARD_SECRET: ci-dashboard-secret
      ADMIN_SECRET: ci-admin-secret
      RESEND_API_KEY: re_test_placeholder

    steps:
      - uses: actions/checkout@v6

      - name: Checkout collector
        uses: actions/checkout@v6
        with:
          repository: apidepth-io/apidepth-collector
          token: ${{ secrets.GH_PAT }}
          path: apidepth-collector

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install collector dependencies
        run: pip install -r apidepth-collector/requirements-dev.txt

      - name: Apply migrations
        working-directory: apidepth-collector
        run: python -m db.migrate

      - name: Seed test customer
        id: seed
        working-directory: apidepth-collector
        run: |
          OUTPUT=$(python -m scripts.seed_pipeline_customer)
          echo "api_key=$(echo "$OUTPUT" | head -1)" >> $GITHUB_OUTPUT

      - name: Start collector
        working-directory: apidepth-collector
        run: |
          uvicorn main:app --host 0.0.0.0 --port 8000 &
          timeout 30 bash -c 'until curl -sf http://localhost:8000/v1/status; do sleep 1; done'

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true

      - name: Pipeline test
        env:
          APIDEPTH_API_KEY: ${{ steps.seed.outputs.api_key }}
          APIDEPTH_COLLECTOR_URL: http://localhost:8000
        run: bundle exec apidepth test
