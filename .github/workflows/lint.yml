name: Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: "${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: true

jobs:
  lint:
    uses: apidepth-io/apidepth-tooling/.github/workflows/lint-ruby.yml@main
    with:
      ruby-version: "3.2"
